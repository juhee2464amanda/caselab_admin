<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const CAT_LABEL = {"web_fetch": "WebFetch", "youtube": "YouTube", "naver_blog": "네이버 블로그", "naver_news": "네이버 뉴스", "naver_cafearticle": "네이버 카페", "naver_kin": "네이버 지식인"};
const PERSONA_LABEL = {"A": "A 자기의심 기획자", "B": "B 정당화당하는 전략팀", "C": "C 강의에 지친 1인 창업가", "D": "D 결과 톤 안 맞는 영업팀장", "E": "E 단순잘쓰는 마케터"};
const state = { search: '', sort: 'score', cats: new Set(), personas: new Set(), shown: 50 };

// 카테고리 필터 빌드
const catCounts = {};
DATA.forEach(d => { catCounts[d.src] = (catCounts[d.src] || 0) + 1; });
const catEl = document.getElementById('cat-filters');
Object.entries(catCounts).sort((a,b) => b[1]-a[1]).forEach(([k, n]) => {
  const label = CAT_LABEL[k] || k;
  const row = document.createElement('label');
  row.className = 'filter-row';
  row.innerHTML = `<input type="checkbox" data-cat="${k}"> <span>${label}</span> <span class="count">${n}</span>`;
  catEl.appendChild(row);
});

// 페르소나 필터 빌드
const pCounts = { '_': 0 };
DATA.forEach(d => {
  if (d.personas.length === 0) pCounts['_'] = (pCounts['_'] || 0) + 1;
  d.personas.forEach(p => { pCounts[p] = (pCounts[p] || 0) + 1; });
});
const pEl = document.getElementById('persona-filters');
const personaOrder = ['A', 'B', 'C', 'D', 'E', '_'];
personaOrder.forEach(p => {
  const n = pCounts[p] || 0;
  const label = p === '_' ? '(미분류)' : PERSONA_LABEL[p];
  const row = document.createElement('label');
  row.className = 'filter-row';
  row.innerHTML = `<input type="checkbox" data-persona="${p}"> <span>${label}</span> <span class="count">${n}</span>`;
  pEl.appendChild(row);
});

function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(text, q) {
  if (!q) return escapeHTML(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escapeHTML(text).replace(re, '<mark>$1</mark>');
}

function filtered() {
  let arr = DATA;
  if (state.cats.size > 0) arr = arr.filter(d => state.cats.has(d.src));
  if (state.personas.size > 0) {
    arr = arr.filter(d => {
      if (state.personas.has('_') && d.personas.length === 0) return true;
      return d.personas.some(p => state.personas.has(p));
    });
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    arr = arr.filter(d => (d.quote + ' ' + d.context).toLowerCase().includes(q));
  }
  if (state.sort === 'length') arr = [...arr].sort((a,b) => b.quote.length - a.quote.length);
  else if (state.sort === 'random') arr = [...arr].sort(() => Math.random() - 0.5);
  // 'score'는 기본 정렬됨
  return arr;
}

function render() {
  const arr = filtered();
  const stats = document.getElementById('stats');
  stats.innerHTML = `<b>${arr.length}</b> 건 표시 중 (전체 ${DATA.length}건 중)`;
  const list = document.getElementById('list');
  list.innerHTML = '';
  const shown = arr.slice(0, state.shown);
  if (shown.length === 0) {
    list.innerHTML = '<div class="empty">조건에 맞는 인용이 없습니다.</div>';
  }
  shown.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    const scoreClass = d.score >= 6 ? 'score high' : 'score';
    const pTags = d.personas.map(p => `<span class="tag persona">${escapeHTML(PERSONA_LABEL[p] || p)}</span>`).join('');
    card.innerHTML = `
      <div class="meta">
        <span class="tag ${scoreClass}">★ ${d.score}</span>
        <span class="tag">${escapeHTML(CAT_LABEL[d.src] || d.src)}</span>
        ${pTags}
      </div>
      <div class="quote">${highlight(d.quote, state.search)}</div>
      ${d.context ? `<div class="context">${highlight(d.context, state.search)}</div>` : ''}
      <div class="source">출처: ${escapeHTML(d.source)} · <a href="${d.url}" target="_blank" rel="noopener">원문 열기 ↗</a></div>
    `;
    list.appendChild(card);
  });
  document.getElementById('loadMore').style.display = arr.length > state.shown ? 'block' : 'none';
}

document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  state.shown = 50;
  render();
});
document.getElementById('sort').addEventListener('change', (e) => {
  state.sort = e.target.value;
  state.shown = 50;
  render();
});
catEl.addEventListener('change', (e) => {
  const cb = e.target;
  if (cb.checked) state.cats.add(cb.dataset.cat);
  else state.cats.delete(cb.dataset.cat);
  state.shown = 50;
  render();
});
pEl.addEventListener('change', (e) => {
  const cb = e.target;
  if (cb.checked) state.personas.add(cb.dataset.persona);
  else state.personas.delete(cb.dataset.persona);
  state.shown = 50;
  render();
});
document.getElementById('loadMore').addEventListener('click', () => {
  state.shown += 50;
  render();
});

render();
