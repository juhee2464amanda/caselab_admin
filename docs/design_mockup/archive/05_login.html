<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 케이스랩</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg:#fff;--bg-sub:#f7f7f7;--ink:#191f28;--gray-800:#333d4b;--gray-600:#6b7684;
      --gray-500:#8b95a1;--gray-400:#b0b8c1;--gray-300:#d1d6db;--gray-200:#e5e8eb;--gray-100:#f2f4f6;
      --blue:#3182f6;--blue-bg:#ebf4ff;--red:#f04452;--kakao:#FEE500;--kakao-text:#191919;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;letter-spacing:-0.02em;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer;border:none;background:none}
    .keepall{word-break:keep-all;overflow-wrap:break-word}

    .gnb{border-bottom:1px solid var(--gray-200)}
    .gnb-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:56px}
    .gnb-logo{font-size:17px;font-weight:800;letter-spacing:-0.04em}
    .gnb-logo small{font-size:10px;font-weight:500;color:var(--gray-400);margin-left:5px;letter-spacing:0.04em;vertical-align:middle}

    .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
    .auth-box{width:100%;max-width:400px}
    .auth-title{font-size:24px;font-weight:800;letter-spacing:-0.03em;text-align:center;margin-bottom:6px}
    .auth-desc{font-size:15px;color:var(--gray-600);text-align:center;margin-bottom:32px}

    .social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 0;font-size:15px;font-weight:600;border-radius:10px;transition:opacity .12s;margin-bottom:10px}
    .social-btn:hover{opacity:.88}
    .btn-kakao{background:var(--kakao);color:var(--kakao-text)}
    .btn-kakao svg{width:20px;height:20px}
    .btn-google{background:#fff;color:var(--ink);border:1px solid var(--gray-200)}
    .btn-google:hover{opacity:1;border-color:var(--gray-400)}
    .btn-google svg{width:18px;height:18px}

    .divider{display:flex;align-items:center;gap:14px;margin:24px 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
    .divider span{font-size:13px;color:var(--gray-400);white-space:nowrap}

    .field{margin-bottom:16px}
    .field-label{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block}
    .field-input{width:100%;padding:12px 14px;font-size:15px;font-family:inherit;border:1px solid var(--gray-200);border-radius:10px;outline:none;transition:border-color .15s;color:var(--ink);background:#fff;letter-spacing:-0.01em}
    .field-input::placeholder{color:var(--gray-400)}
    .field-input:focus{border-color:var(--blue)}
    .field-input.error{border-color:var(--red)}
    .field-error{font-size:12px;color:var(--red);margin-top:4px;display:none}

    .field-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .field-check{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-600)}
    .field-check input{width:16px;height:16px;accent-color:var(--blue)}
    .field-link{font-size:13px;color:var(--blue);font-weight:500}
    .field-link:hover{text-decoration:underline;text-underline-offset:2px}

    .btn-submit{width:100%;padding:14px;font-size:16px;font-weight:700;font-family:inherit;color:#fff;background:var(--blue);border:none;border-radius:10px;cursor:pointer;transition:background .15s;letter-spacing:-0.02em}
    .btn-submit:hover{background:#1b6ef2}
    .btn-submit:disabled{background:var(--gray-300);cursor:default}

    .signup-fields{display:none}
    .signup-fields.show{display:block}

    .auth-toggle{text-align:center;margin-top:24px;font-size:14px;color:var(--gray-600)}
    .auth-toggle a{color:var(--blue);font-weight:600;margin-left:4px}
    .auth-toggle a:hover{text-decoration:underline;text-underline-offset:2px}

    .terms{margin-top:20px;text-align:center;font-size:12px;color:var(--gray-400);line-height:1.5}
    .terms a{color:var(--gray-500);text-decoration:underline;text-underline-offset:2px}

    .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--ink);color:#fff;font-size:14px;font-weight:600;border-radius:10px;z-index:999;display:none;animation:toastIn .2s ease}
    .toast.show{display:block}
    .toast.err{background:var(--red)}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  </style>
</head>
<body>

  <header class="gnb">
    <div class="gnb-inner">
      <a href="04_home_toss.html" class="gnb-logo">케이스랩<small>CASELAB</small></a>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <div class="auth-wrap">
    <div class="auth-box">
      <h1 class="auth-title" id="authTitle">로그인</h1>
      <p class="auth-desc keepall" id="authDesc">AI 실무 케이스를 저장하고, 새 글 알림을 받아보세요.</p>

      <!-- Social -->
      <button class="social-btn btn-kakao" type="button" id="kakaoBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.463 2 10.691c0 2.726 1.8 5.117 4.51 6.473-.145.522-.935 3.367-.968 3.578 0 0-.02.166.088.229.108.063.235.03.235.03.31-.044 3.588-2.342 4.157-2.741.64.09 1.3.14 1.978.14 5.523 0 10-3.463 10-7.709C22 6.463 17.523 3 12 3"/></svg>
        카카오로 시작하기
      </button>
      <button class="social-btn btn-google" type="button" id="googleBtn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google로 시작하기
      </button>

      <div class="divider"><span>또는 이메일로</span></div>

      <!-- Email Form -->
      <form id="authForm" onsubmit="return false;">
        <div class="signup-fields" id="sf1">
          <div class="field">
            <label class="field-label" for="name">이름</label>
            <input class="field-input" id="name" type="text" placeholder="이름을 입력하세요" autocomplete="name" />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="email">이메일</label>
          <input class="field-input" id="email" type="email" placeholder="you@company.com" autocomplete="email" />
          <div class="field-error" id="emailErr"></div>
        </div>

        <div class="field">
          <label class="field-label" for="password">비밀번호</label>
          <input class="field-input" id="password" type="password" placeholder="8자 이상" autocomplete="current-password" />
          <div class="field-error" id="pwErr"></div>
        </div>

        <div class="signup-fields" id="sf2">
          <div class="field">
            <label class="field-label" for="passwordConfirm">비밀번호 확인</label>
            <input class="field-input" id="passwordConfirm" type="password" placeholder="비밀번호를 다시 입력하세요" />
            <div class="field-error" id="pwcErr"></div>
          </div>
          <div class="field">
            <label class="field-label" for="job">직무 (선택)</label>
            <select class="field-input" id="job" style="color:var(--gray-400);appearance:none;background-image:url('data:image/svg+xml,%3Csvg width=%2712%27 height=%278%27 viewBox=%270 0 12 8%27 fill=%27none%27 xmlns=%27http://www.w3.org/2000/svg%27%3E%3Cpath d=%27M1 1.5L6 6.5L11 1.5%27 stroke=%27%23b0b8c1%27 stroke-width=%271.5%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 14px center">
              <option value="">관심 직무를 선택해 주세요</option>
              <option value="기획">기획</option>
              <option value="마케팅">마케팅</option>
              <option value="영업">영업</option>
              <option value="1인사업">1인사업 / 프리랜서</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>

        <div class="field-row" id="loginOpts">
          <label class="field-check"><input type="checkbox" checked /> 로그인 유지</label>
          <a href="#" class="field-link" id="forgotLink">비밀번호 찾기</a>
        </div>

        <div class="signup-fields" id="sf3" style="margin-bottom:24px">
          <label class="field-check" style="margin-bottom:8px">
            <input type="checkbox" id="agreeTerms" /> <span class="keepall"><a href="#" style="color:var(--blue);text-decoration:underline;text-underline-offset:2px">이용약관</a> 및 <a href="#" style="color:var(--blue);text-decoration:underline;text-underline-offset:2px">개인정보 처리방침</a>에 동의합니다 (필수)</span>
          </label>
          <label class="field-check">
            <input type="checkbox" id="agreeNews" checked /> <span class="keepall">새 글·트렌드 뉴스레터 수신 (선택)</span>
          </label>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">로그인</button>
      </form>

      <div class="auth-toggle" id="authToggle">
        <span id="toggleText">아직 계정이 없나요?</span><a href="#" id="toggleLink">회원가입</a>
      </div>

      <div class="terms keepall">
        소셜 로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의하는 것으로 간주합니다.
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script>
    let isSignup = false;

    // ── Toast ──
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' err' : '');
      setTimeout(() => t.className = 'toast', 3000);
    }

    // ── Toggle mode ──
    document.getElementById('toggleLink').addEventListener('click', function(e) {
      e.preventDefault();
      isSignup = !isSignup;
      document.getElementById('authTitle').textContent = isSignup ? '회원가입' : '로그인';
      document.getElementById('authDesc').textContent = isSignup
        ? '30초면 끝나요. 가입하고 AI 실무 케이스를 받아보세요.'
        : 'AI 실무 케이스를 저장하고, 새 글 알림을 받아보세요.';
      document.getElementById('submitBtn').textContent = isSignup ? '가입하기' : '로그인';
      document.getElementById('toggleLink').textContent = isSignup ? '로그인' : '회원가입';
      document.getElementById('toggleText').textContent = isSignup ? '이미 계정이 있나요?' : '아직 계정이 없나요?';
      document.querySelectorAll('.signup-fields').forEach(el => el.classList.toggle('show', isSignup));
      document.getElementById('loginOpts').style.display = isSignup ? 'none' : 'flex';
      document.getElementById('password').setAttribute('autocomplete', isSignup ? 'new-password' : 'current-password');
    });

    // ── Google login ──
    document.getElementById('googleBtn').addEventListener('click', async function() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname.replace('05_login.html', '04_home_toss.html') }
      });
      if (error) showToast(error.message, true);
    });

    // ── Kakao login ──
    document.getElementById('kakaoBtn').addEventListener('click', async function() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'kakao',
        options: { redirectTo: window.location.origin + window.location.pathname.replace('05_login.html', '04_home_toss.html') }
      });
      if (error) showToast(error.message, true);
    });

    // ── Email submit ──
    document.getElementById('authForm').addEventListener('submit', async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      document.querySelectorAll('.field-error').forEach(e => { e.style.display = 'none'; });
      document.querySelectorAll('.field-input').forEach(e => e.classList.remove('error'));

      if (!email) return showFieldErr('email', 'emailErr', '이메일을 입력해 주세요.');
      if (password.length < 8) return showFieldErr('password', 'pwErr', '비밀번호는 8자 이상이어야 합니다.');

      if (isSignup) {
        const pw2 = document.getElementById('passwordConfirm').value;
        if (password !== pw2) return showFieldErr('passwordConfirm', 'pwcErr', '비밀번호가 일치하지 않습니다.');
        if (!document.getElementById('agreeTerms').checked) return showToast('이용약관에 동의해 주세요.', true);

        const name = document.getElementById('name').value.trim();
        const job = document.getElementById('job').value;
        const newsletter = document.getElementById('agreeNews').checked;

        const { data, error } = await supabase.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });

        if (error) return showToast(error.message, true);

        // update profile with extra fields
        if (data.user) {
          await supabase.from('profiles').update({ name, job, newsletter }).eq('id', data.user.id);
        }

        showToast('가입 완료! 이메일 인증 후 로그인해 주세요.');
      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return showToast('이메일 또는 비밀번호가 올바르지 않습니다.', true);
        window.location.href = '04_home_toss.html';
      }
    });

    // ── Password reset ──
    document.getElementById('forgotLink').addEventListener('click', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return showToast('이메일을 먼저 입력해 주세요.', true);
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });
      if (error) return showToast(error.message, true);
      showToast('비밀번호 재설정 이메일을 보냈습니다.');
    });

    function showFieldErr(inputId, errId, msg) {
      document.getElementById(inputId).classList.add('error');
      const err = document.getElementById(errId);
      err.textContent = msg;
      err.style.display = 'block';
    }

    // ── Already logged in? Redirect ──
    (async function() {
      const user = await getCurrentUser();
      if (user) window.location.href = '04_home_toss.html';
    })();
  </script>
</body>
</html>
